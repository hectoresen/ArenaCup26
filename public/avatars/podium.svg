    <rect x="171" y="190" width="10" height="16" rx="4" fill="#7a3010" stroke="#501a00" stroke-width="1.5"/>
    <rect x="191" y="190" width="10" height="16" rx="4" fill="#7a3010" stroke="#501a00" stroke-width="1.5"/>
    <ellipse cx="176" cy="206" rx="8" ry="5" fill="#222" stroke="#333" stroke-width="1.2"/>
