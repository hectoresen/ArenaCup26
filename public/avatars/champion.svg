<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <clipPath id="cc1"><circle cx="128" cy="128" r="128"/></clipPath>
    <radialGradient id="bg1" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#1e2d50"/>
      <stop offset="100%" stop-color="#0d1630"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#cc1)">

    <!-- BG -->
    <rect width="256" height="256" fill="url(#bg1)"/>
    <!-- BG glow -->
    <ellipse cx="128" cy="128" rx="110" ry="110" fill="rgba(245,200,66,0.07)"/>

    <!-- Confetti dots -->
    <circle cx="32"  cy="42"  r="5" fill="#f5c842" opacity="0.8"/>
    <circle cx="220" cy="38"  r="4" fill="#ff6b9d" opacity="0.8"/>
    <circle cx="48"  cy="200" r="4" fill="#4fc3f7" opacity="0.7"/>
    <circle cx="210" cy="195" r="5" fill="#34d97b" opacity="0.7"/>
    <circle cx="200" cy="80"  r="3" fill="#f5c842" opacity="0.6"/>
    <circle cx="58"  cy="100" r="3" fill="#ff8c42" opacity="0.7"/>
    <circle cx="235" cy="148" r="4" fill="#c084fc" opacity="0.7"/>
    <circle cx="22"  cy="155" r="3" fill="#f5c842" opacity="0.6"/>
    <!-- Confetti rectangles -->
    <rect x="180" y="55"  width="8" height="5" rx="1" fill="#34d97b"  opacity="0.7" transform="rotate(25 184 57)"/>
    <rect x="65"  y="65"  width="7" height="4" rx="1" fill="#ff6b9d"  opacity="0.7" transform="rotate(-18 68 67)"/>
    <rect x="215" y="115" width="8" height="4" rx="1" fill="#4fc3f7"  opacity="0.65" transform="rotate(40 219 117)"/>
    <rect x="30"  y="120" width="7" height="4" rx="1" fill="#c084fc"  opacity="0.65" transform="rotate(-30 33 122)"/>
    <rect x="195" y="220" width="8" height="5" rx="1" fill="#f5c842"  opacity="0.6" transform="rotate(15 199 222)"/>
    <rect x="50"  y="225" width="6" height="4" rx="1" fill="#ff8c42"  opacity="0.65" transform="rotate(-20 53 227)"/>

    <!-- CROWN (big, bold cartoon) -->
    <!-- Crown base -->
    <rect x="78" y="88" width="100" height="36" rx="8" fill="#f5c842" stroke="#c88800" stroke-width="3"/>
    <!-- Crown points -->
    <polygon points="78,88 98,52 118,88" fill="#f5c842" stroke="#c88800" stroke-width="3" stroke-linejoin="round"/>
    <polygon points="108,88 128,44 148,88" fill="#f5c842" stroke="#c88800" stroke-width="3" stroke-linejoin="round"/>
    <polygon points="138,88 158,52 178,88" fill="#f5c842" stroke="#c88800" stroke-width="3" stroke-linejoin="round"/>
    <!-- Crown gems -->
    <circle cx="98"  cy="74" r="7" fill="#ff4d6d" stroke="#c00030" stroke-width="1.5"/>
    <circle cx="128" cy="66" r="8" fill="#4fc3f7" stroke="#0080b0" stroke-width="1.5"/>
    <circle cx="158" cy="74" r="7" fill="#34d97b" stroke="#007830" stroke-width="1.5"/>
    <!-- Gem shine -->
    <circle cx="96"  cy="72" r="2.5" fill="white" opacity="0.6"/>
    <circle cx="126" cy="64" r="3"   fill="white" opacity="0.6"/>
    <circle cx="156" cy="72" r="2.5" fill="white" opacity="0.6"/>
    <!-- Crown base dots -->
    <circle cx="95"  cy="106" r="4" fill="#e8834a" stroke="#a04400" stroke-width="1.2"/>
    <circle cx="113" cy="106" r="4" fill="#e8834a" stroke="#a04400" stroke-width="1.2"/>
    <circle cx="128" cy="106" r="4" fill="#e8834a" stroke="#a04400" stroke-width="1.2"/>
    <circle cx="143" cy="106" r="4" fill="#e8834a" stroke="#a04400" stroke-width="1.2"/>
    <circle cx="161" cy="106" r="4" fill="#e8834a" stroke="#a04400" stroke-width="1.2"/>

    <!-- FOOTBALL (cartoon, chunky) -->
    <circle cx="128" cy="172" r="50" fill="white" stroke="#222" stroke-width="4"/>
    <!-- Shadow on ball -->
    <ellipse cx="140" cy="185" rx="36" ry="28" fill="rgba(0,0,0,0.08)"/>
    <!-- Pentagon patches -->
    <path d="M128 130 L143 141 L137 159 L119 159 L113 141 Z" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M100 148 L113 141 L119 159 L109 171 L96 164 Z" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M156 148 L143 141 L137 159 L147 171 L160 164 Z" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M96  179 L109 171 L119 159 L119 174 L108 183 Z" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1"/>
    <path d="M160 179 L147 171 L137 159 L137 174 L148 183 Z" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1"/>
    <!-- Ball shine -->
    <ellipse cx="114" cy="152" rx="10" ry="7" fill="white" opacity="0.55" transform="rotate(-20 114 152)"/>

    <!-- Stars around crown -->
    <polygon points="62,56 65,47 68,56 77,56 70,62 73,71 65,65 57,71 60,62 53,56" fill="#f5c842" stroke="#c88800" stroke-width="1"/>
    <polygon points="194,56 197,47 200,56 209,56 202,62 205,71 197,65 189,71 192,62 185,56" fill="#f5c842" stroke="#c88800" stroke-width="1"/>

    <!-- "#1" label bottom -->
    <rect x="104" y="214" width="48" height="26" rx="8" fill="#f5c842" stroke="#c88800" stroke-width="2.5"/>
    <text x="128" y="232" text-anchor="middle" font-family="Fredoka One, cursive" font-size="17" fill="#1a1000">#1</text>

  </g>
</svg>
