<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <clipPath id="cc4"><circle cx="128" cy="128" r="128"/></clipPath>
    <radialGradient id="bg4c" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#200d40"/>
      <stop offset="100%" stop-color="#0a0518"/>
    </radialGradient>
    <radialGradient id="crystalFill" cx="38%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#a0e8ff"/>
      <stop offset="40%"  stop-color="#4fc3f7"/>
      <stop offset="80%"  stop-color="#1a5080"/>
      <stop offset="100%" stop-color="#0a2040"/>
    </radialGradient>
    <radialGradient id="crystalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4fc3f7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c084fc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="baseG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8040c0"/>
      <stop offset="100%" stop-color="#3a1060"/>
    </linearGradient>
    <linearGradient id="baseShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="gfCrystal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="gfSm" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <g clip-path="url(#cc4)">

    <!-- BG -->
    <rect width="256" height="256" fill="url(#bg4c)"/>

    <!-- Stars -->
    <circle cx="22"  cy="25"  r="1.5" fill="white" opacity="0.9"/>
    <circle cx="80"  cy="18"  r="1"   fill="white" opacity="0.7"/>
    <circle cx="148" cy="22"  r="1.3" fill="white" opacity="0.8"/>
    <circle cx="210" cy="30"  r="1.1" fill="white" opacity="0.75"/>
    <circle cx="240" cy="80"  r="1.4" fill="white" opacity="0.8"/>
    <circle cx="18"  cy="95"  r="1"   fill="white" opacity="0.65"/>
    <circle cx="235" cy="145" r="1.2" fill="#c084fc" opacity="0.9"/>
    <circle cx="25"  cy="170" r="1.3" fill="#4fc3f7" opacity="0.8"/>
    <circle cx="50"  cy="220" r="1.4" fill="white"   opacity="0.7"/>
    <circle cx="205" cy="225" r="1"   fill="#f5c842" opacity="0.8"/>
    <circle cx="240" cy="200" r="1.5" fill="white"   opacity="0.75"/>
    <!-- Purple sparkles -->
    <circle cx="60"  cy="48"  r="2"   fill="#c084fc" opacity="0.8" filter="url(#gfSm)"/>
    <circle cx="196" cy="55"  r="1.8" fill="#f5c842" opacity="0.9" filter="url(#gfSm)"/>
    <circle cx="35"  cy="140" r="1.8" fill="#c084fc" opacity="0.75" filter="url(#gfSm)"/>
    <circle cx="222" cy="120" r="2"   fill="#4fc3f7" opacity="0.8" filter="url(#gfSm)"/>

    <!-- Magic particles drifting up -->
    <circle cx="100" cy="170" r="2.5" fill="#c084fc" opacity="0.7" filter="url(#gfSm)"/>
    <circle cx="128" cy="155" r="2"   fill="#4fc3f7" opacity="0.6" filter="url(#gfSm)"/>
    <circle cx="156" cy="162" r="2.5" fill="#f5c842" opacity="0.65" filter="url(#gfSm)"/>
    <circle cx="112" cy="140" r="1.5" fill="#c084fc" opacity="0.5"/>
    <circle cx="144" cy="145" r="1.5" fill="#4fc3f7" opacity="0.5"/>

    <!-- ── CRYSTAL BALL ── -->
    <!-- Outer glow -->
    <circle cx="128" cy="130" r="82" fill="url(#crystalGlow)" filter="url(#gfCrystal)"/>
    <!-- Ball shadow on base -->
    <ellipse cx="128" cy="205" rx="56" ry="10" fill="rgba(0,0,0,0.45)"/>
    <!-- Crystal ball body -->
    <circle cx="128" cy="128" r="72" fill="url(#crystalFill)" stroke="#80d0f8" stroke-width="3"/>
    <!-- Inner glow -->
    <circle cx="128" cy="128" r="62" fill="url(#innerGlow)"/>
    <!-- Ball shine top-left -->
    <ellipse cx="102" cy="100" rx="22" ry="14" fill="rgba(255,255,255,0.35)" transform="rotate(-25 102 100)"/>
    <ellipse cx="96"  cy="95"  rx="10" ry="6"  fill="rgba(255,255,255,0.55)" transform="rotate(-25 96 95)"/>

    <!-- Football INSIDE the crystal ball -->
    <circle cx="128" cy="135" r="36" fill="rgba(10,20,60,0.6)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- Ball patches (glowing inside) -->
    <path d="M128 103 L137 110 L134 122 L122 122 L119 110 Z" fill="white" opacity="0.85"/>
    <path d="M109 112 L119 110 L122 122 L115 129 L105 124 Z" fill="white" opacity="0.65"/>
    <path d="M147 112 L137 110 L134 122 L141 129 L151 124 Z" fill="white" opacity="0.65"/>
    <path d="M105 136 L115 129 L122 122 L122 132 L113 139 Z" fill="white" opacity="0.5"/>
    <path d="M151 136 L141 129 L134 122 L134 132 L143 139 Z" fill="white" opacity="0.5"/>
    <!-- Ball glow inside -->
    <circle cx="128" cy="135" r="36" fill="none" stroke="rgba(192,132,252,0.4)" stroke-width="2"/>

    <!-- Question marks / prediction symbols -->
    <text x="100" cy="155" y="158" font-family="Fredoka One, cursive" font-size="20" fill="#c084fc" opacity="0.7" transform="rotate(-15 100 155)">?</text>
    <text x="148" cy="155" y="160" font-family="Fredoka One, cursive" font-size="20" fill="#f5c842" opacity="0.7" transform="rotate(12 148 155)">!</text>

    <!-- ── BALL BASE / STAND ── -->
    <ellipse cx="128" cy="204" rx="48" ry="14" fill="url(#baseG)" stroke="#6020a0" stroke-width="2.5"/>
    <ellipse cx="128" cy="204" rx="48" ry="14" fill="url(#baseShine)"/>
    <!-- Base gems -->
    <circle cx="98"  cy="204" r="5" fill="#f5c842" stroke="#c88800" stroke-width="1.2"/>
    <circle cx="128" cy="200" r="5" fill="#c084fc" stroke="#8040a0" stroke-width="1.2"/>
    <circle cx="158" cy="204" r="5" fill="#4fc3f7" stroke="#0080b0" stroke-width="1.2"/>
    <!-- Gem shines -->
    <circle cx="96"  cy="202" r="1.8" fill="white" opacity="0.6"/>
    <circle cx="126" cy="198" r="1.8" fill="white" opacity="0.6"/>
    <circle cx="156" cy="202" r="1.8" fill="white" opacity="0.6"/>

    <!-- Bottom pedestal -->
    <rect x="100" y="216" width="56" height="14" rx="5" fill="url(#baseG)" stroke="#6020a0" stroke-width="2"/>
    <rect x="108" y="228" width="40" height="10" rx="4" fill="#3a1060" stroke="#6020a0" stroke-width="2"/>

    <!-- "PREDICE" top label -->
    <text x="128" y="44" text-anchor="middle" font-family="Fredoka One, cursive" font-size="18" fill="#c084fc" opacity="0.85" letter-spacing="2">PREDICE</text>
    <line x1="52"  y1="50" x2="96"  y2="50" stroke="#c084fc" stroke-width="1.5" opacity="0.4"/>
    <line x1="160" y1="50" x2="204" y2="50" stroke="#c084fc" stroke-width="1.5" opacity="0.4"/>

  </g>
</svg>
