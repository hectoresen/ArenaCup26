<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <clipPath id="cl4"><circle cx="128" cy="128" r="128"/></clipPath>
    <radialGradient id="bgR" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a1000"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </radialGradient>
    <radialGradient id="ballR" cx="32%" cy="26%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="65%" stop-color="#eeeeee"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
    <radialGradient id="refBg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(245,200,66,0.15)"/>
      <stop offset="100%" stop-color="rgba(245,200,66,0)"/>
    </radialGradient>
    <linearGradient id="jerseyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#c88000"/>
    </linearGradient>
    <linearGradient id="cardG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="sdR" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="5" flood-color="rgba(180,0,0,0.5)"/>
    </filter>
    <filter id="glowR" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <g clip-path="url(#cl4)">

    <!-- BG -->
    <rect width="256" height="256" fill="url(#bgR)"/>
    <circle cx="128" cy="128" r="115" fill="url(#refBg)"/>
    <!-- Subtle hex pattern -->
    <pattern id="hexP" x="0" y="0" width="28" height="32" patternUnits="userSpaceOnUse">
      <path d="M14 2 L26 9 L26 23 L14 30 L2 23 L2 9 Z" fill="none" stroke="rgba(245,200,66,0.05)" stroke-width="1"/>
    </pattern>
    <rect width="256" height="256" fill="url(#hexP)"/>

    <!-- ── REFEREE JERSEY ON BALL ── -->
    <!-- Jersey (big, covering lower half of ball area) -->
    <!-- Draw behind ball -->
    <rect x="82" y="155" width="92" height="72" rx="12" fill="url(#jerseyG)" stroke="#c88000" stroke-width="3"/>
    <!-- Jersey collar -->
    <path d="M128 155 L110 155 L114 170 L128 176 L142 170 L146 155 Z" fill="#c88000"/>
    <!-- Jersey stripes -->
    <rect x="118" y="155" width="20" height="72" rx="6" fill="rgba(0,0,0,0.1)"/>
    <!-- Referee badge on jersey (left breast) -->
    <rect x="90"  y="164" width="26" height="18" rx="4" fill="rgba(0,0,0,0.25)" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    <text x="103" y="176" text-anchor="middle" font-family="Fredoka One, cursive" font-size="7" fill="rgba(0,0,0,0.5)">FIFA</text>
    <!-- Arms (short jersey sleeves visible sides) -->
    <rect x="52" y="165" width="32" height="18" rx="9" fill="url(#jerseyG)" stroke="#c88000" stroke-width="2.5"/>
    <rect x="172" y="165" width="32" height="18" rx="9" fill="url(#jerseyG)" stroke="#c88000" stroke-width="2.5"/>

    <!-- ── BALL BODY ── -->
    <circle cx="128" cy="122" r="82" fill="#ff4d6d" opacity="0.12" filter="url(#glowR)"/>
    <circle cx="128" cy="122" r="78" fill="url(#ballR)" stroke="#222" stroke-width="4" filter="url(#sdR)"/>
    <!-- Patches -->
    <path d="M128 50  L145 62  L139 82  L117 82  L111 62  Z" fill="#1a1a1a"/>
    <path d="M90  62  L111 62  L117 82  L102 96  L81  88  Z" fill="#1a1a1a"/>
    <path d="M166 62  L145 62  L139 82  L154 96  L175 88  Z" fill="#1a1a1a"/>
    <path d="M77  100 L102 96  L117 82  L117 100 L102 112 Z" fill="#1a1a1a"/>
    <path d="M179 100 L154 96  L139 82  L139 100 L154 112 Z" fill="#1a1a1a"/>
    <!-- Ball shine -->
    <ellipse cx="104" cy="74" rx="18" ry="11" fill="rgba(255,255,255,0.55)" transform="rotate(-20 104 74)"/>
    <ellipse cx="98"  cy="66" rx="8"  ry="5"  fill="rgba(255,255,255,0.7)" transform="rotate(-20 98 66)"/>

    <!-- ── WHISTLE around neck ── -->
    <circle cx="128" cy="152" r="7" fill="#c8c8c8" stroke="#888" stroke-width="1.5"/>
    <rect x="120" y="150" width="16" height="5" rx="2.5" fill="#a0a0a0" stroke="#888" stroke-width="1"/>
    <path d="M128 156 C116 160 108 158 108 162" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round"/>
    <circle cx="108" cy="162" r="3" fill="#c8c8c8" stroke="#888" stroke-width="1"/>

    <!-- ── FACE ── -->
    <!-- Authority brows (flat, horizontal, serious) -->
    <path d="M80 118 Q96 112 112 116" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M144 116 Q160 112 176 118" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round" fill="none"/>

    <!-- Eyes (stern, half-lidded) -->
    <!-- Left eye -->
    <ellipse cx="96"  cy="128" rx="16" ry="12" fill="white" stroke="#222" stroke-width="2"/>
    <path d="M80 122 Q96 118 112 122" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="98"  cy="130" r="7" fill="#1a1a1a"/>
    <circle cx="100" cy="127" r="2.5" fill="white" opacity="0.65"/>
    <!-- Right eye -->
    <ellipse cx="160" cy="128" rx="16" ry="12" fill="white" stroke="#222" stroke-width="2"/>
    <path d="M144 122 Q160 118 176 122" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="162" cy="130" r="7" fill="#1a1a1a"/>
    <circle cx="164" cy="127" r="2.5" fill="white" opacity="0.65"/>

    <!-- Moustache (classic ref look) -->
    <path d="M106 148 Q116 142 128 146 Q140 142 150 148" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="1"/>

    <!-- Mouth (firm, serious line) -->
    <path d="M108 156 Q128 150 148 156" fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"/>

    <!-- ── RED CARD (raised arm holding it) ── -->
    <!-- Arm up (right side) -->
    <path d="M174 178 C188 162 196 140 200 118" fill="none" stroke="url(#jerseyG)" stroke-width="22" stroke-linecap="round"/>
    <path d="M174 178 C188 162 196 140 200 118" fill="none" stroke="#d4a000" stroke-width="18" stroke-linecap="round"/>
    <!-- Hand -->
    <circle cx="200" cy="112" r="16" fill="#f0d0a0" stroke="#c89060" stroke-width="2.5"/>
    <!-- RED CARD -->
    <rect x="206" y="56" width="36" height="50" rx="5" fill="url(#cardG)" stroke="#880000" stroke-width="2.5" filter="url(#cardShadow)"/>
    <!-- Card shine -->
    <rect x="210" y="60" width="10" height="42" rx="3" fill="rgba(255,255,255,0.2)"/>
    <!-- Card number -->
    <text x="224" y="90" text-anchor="middle" font-family="Fredoka One, cursive" font-size="22" fill="rgba(255,255,255,0.9)">!</text>

    <!-- Glow from card -->
    <rect x="206" y="56" width="36" height="50" rx="5" fill="#ff0000" opacity="0.15" filter="url(#glowR)"/>

    <!-- Stars / impact around card -->
    <circle cx="252" cy="50" r="5" fill="#ff4d6d" opacity="0.8" filter="url(#glowR)"/>
    <circle cx="242" cy="34" r="3" fill="#f5c842" opacity="0.7" filter="url(#glowR)"/>

    <!-- BOTTOM LABEL -->
    <rect x="68" y="222" width="120" height="26" rx="10" fill="#ff4444" stroke="#cc0000" stroke-width="2"/>
    <text x="128" y="239" text-anchor="middle" font-family="Fredoka One, cursive" font-size="14" fill="white">¡TARJETA!</text>

  </g>
</svg>
