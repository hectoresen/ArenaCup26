name: Live scoring

# Cron de alta frecuencia (cada 2 min) que refresca los MARCADORES en
# vivo. Llama a /api/cron/live-scoring:
#
# - Si NO hay partidos `live` y NO hay kickoffs en Â±15/30 min â†’ 200
#   con `synced: false` sin tocar api-football (skip silencioso).
# - Si SĂŤ â†’ 1 req a api-football pidiendo solo los fixtures de hoy,
#   actualiza marcadores y status en BD.
# - Cuando un partido pasa a `finished` â†’ dispara
#   `processFinishedMatch` in-band â†’ calcula puntos y los persiste en
#   `user_points` para todos los users que predijeron.
#
# Es el cron de "marcador en vivo". Complementario a
# `match-data-sync.yml` que corre cada 3h con ventana amplia.
#
# Ver `docs/data-pipeline.md` para el flujo completo de datos.
#
# **Setup en GitHub** (una vez):
#   1. Settings â†’ Secrets â†’ `RAILWAY_LIVE_URL` =
#      https://www.arenacup26.com/api/cron/live-scoring
#   2. Reusar el `CRON_SECRET` ya configurado.

on:
  # Reactivado 2026-05-18 con plan Pro $19 (7 500 req/dĂ­a). Cada 2 min
  # = 720 ticks/dĂ­a. La mayorĂ­a devuelven `synced:false` sin tocar
  # api-football gracias a `shouldSyncLive`. Solo cuando hay live o
  # kickoff cercano se hace 1 req al provider â†’ cabe sobrado en el
  # budget Pro.
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch: {}

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger live-scoring endpoint
        env:
          URL: ${{ secrets.RAILWAY_LIVE_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ]; then
            echo "âťŚ RAILWAY_LIVE_URL secret not configured."
            exit 1
          fi
          # DiagnĂłstico defensivo del secret (no se imprime el valor â€”
          # solo el host extraĂ­do y la longitud). Cubre el caso tĂ­pico de
          # secret con whitespace/CR oculto o protocolo equivocado.
          HOST=$(echo "$URL" | sed -E 's,https?://([^/]+).*,\1,')
          BYTES=$(printf '%s' "$URL" | wc -c)
          echo "Target host: '$HOST' (URL bytes: $BYTES)"
          if [ -n "$SECRET" ]; then
            HEADERS=(-H "Authorization: Bearer $SECRET")
          else
            HEADERS=()
          fi
          response=$(curl -sS -w "\n%{http_code}" -X POST "${HEADERS[@]}" "$URL")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status"
          echo "Body: $body"
          # 204 (sin partidos relevantes) es estado normal, NO error.
          # >= 400 sĂ­ lo es.
          if [ "$status" -ge 400 ]; then
            echo "âťŚ Live-scoring endpoint returned error status"
            exit 1
          fi
          echo "âś“ Live-scoring OK"
