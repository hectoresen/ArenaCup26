name: E2E tests

# Playwright golden paths sobre las páginas públicas. No prueba el
# flujo OAuth — eso requiere credenciales dedicadas y vale la pena
# diferirlo. El objetivo es atrapar regresiones tipo "el build se
# rompió" o "i18n routing dejó de resolver".

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Env vars mínimas para que el build pase la validación de
      # zod. Valores ficticios; los tests no autentican.
      AUTH_SECRET: "ci-auth-secret-must-be-at-least-32-chars-long"
      GOOGLE_CLIENT_ID: "ci-google-client-id"
      GOOGLE_CLIENT_SECRET: "ci-google-client-secret"
      DATABASE_URL: "postgres://postgres:postgres@localhost:5432/wmundial_e2e"
      CRON_SECRET: "ci-cron-secret-must-be-at-least-32-chars-long"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wmundial_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run migrations
        run: npx drizzle-kit migrate
      - name: Run Playwright
        run: npx playwright test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
