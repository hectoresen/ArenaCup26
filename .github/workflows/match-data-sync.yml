name: Match data sync

# Sincronización periódica del CALENDARIO de partidos desde api-football
# a nuestra BD. Pilla partidos de las 7 ligas configuradas en una ventana
# de hoy-1d a hoy+7d: equipos, kickoff, estadio, fase y status.
#
# - Upserta partidos nuevos y actualiza cambios (fecha movida, status,
#   marcador final si llega).
# - Si un partido transiciona a `finished` durante el sync, dispara
#   `processFinishedMatch` → calcula y persiste puntos en `user_points`.
# - Descubre equipos nuevos al vuelo (escudo + nombre + código).
#
# Es el "calendario amplio". El live-scoring (marcador en vivo cada
# 2 min) vive aparte como self-scheduler in-process dentro de
# wmundial — ver `docs/data-pipeline.md §self-scheduler`.
#
# Ver `docs/data-pipeline.md` para el flujo completo de datos.
#
# **Setup en GitHub** (una vez):
#   1. Settings → Secrets → `RAILWAY_SYNC_URL` =
#      https://www.arenacup26.com/api/cron/sync-fixtures
#   2. Reusar `CRON_SECRET` (mismo valor que en Railway).
#
# Nota: el endpoint sigue siendo `/api/cron/sync-fixtures` por compat
# con el secret existente. El workflow se renombró a `match-data-sync`
# (2026-05-18) porque "fixtures" en jerga sports se confundía con
# "fixtures de test" del lenguaje dev.

on:
  # Reactivado 2026-05-18 con plan Pro. Cadencia cada 3h (8 ticks/día).
  # Cada tick hace 1 req al provider con ventana ±1/+7 días filtrada a
  # las 7 ligas top. Coste real ≈ 8 req/día — despreciable frente al
  # budget Pro de 7 500/día.
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger sync endpoint
        env:
          URL: ${{ secrets.RAILWAY_SYNC_URL }}
          SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$URL" ]; then
            echo "❌ RAILWAY_SYNC_URL secret not configured."
            exit 1
          fi
          # Diagnóstico defensivo del secret (no se imprime el valor —
          # solo el host extraído y la longitud). Cubre el caso típico de
          # secret con whitespace/CR oculto o protocolo equivocado.
          HOST=$(echo "$URL" | sed -E 's,https?://([^/]+).*,\1,')
          BYTES=$(printf '%s' "$URL" | wc -c)
          echo "Target host: '$HOST' (URL bytes: $BYTES)"
          if [ -n "$SECRET" ]; then
            HEADERS=(-H "Authorization: Bearer $SECRET")
          else
            HEADERS=()
          fi
          response=$(curl -sS -w "\n%{http_code}" -X POST "${HEADERS[@]}" "$URL")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status"
          echo "Body: $body"
          if [ "$status" -ge 400 ]; then
            echo "❌ Sync endpoint returned error status"
            exit 1
          fi
          echo "✓ Sync OK"
