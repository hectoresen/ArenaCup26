name: DB backup (tournament cadence)

# Backup cada 6h durante el Mundial 2026 (11 jun → 19 jul). Sube los
# dumps como artifacts con nombre prefijado `tournament-` para
# distinguirlos del daily.
#
# Coexiste con `db-backup.yml` (diario a 03:00 UTC).
# La idea es: el daily sigue siendo la base de retención larga (90d);
# este workflow añade granularidad fina solo mientras el torneo está
# activo. Cadencia 6h en ventana de 38 días = ~152 dumps.
#
# **Setup**: mismo secret que db-backup.yml (`DATABASE_URL`).
#
# **Descarga del backup más reciente** (para restore):
#   ```bash
#   gh run list --workflow=db-backup-tournament.yml --limit 5
#   gh run download <run-id> --name wmundial-tournament-backup --dir ./restore
#   zcat ./restore/wmundial-*.sql.gz | psql "$DATABASE_URL"
#   ```

on:
  schedule:
    # Cada 6h: 00:00, 06:00, 12:00, 18:00 UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

# Fechas del Mundial 2026 (kickoff 11 jun, final 19 jul). El guard
# de fechas vive en el primer step del job para que GitHub Actions
# no spamee jobs vacíos fuera del torneo (cuesta cero pero contamina
# los logs).
env:
  MUNDIAL_START: "2026-06-11"
  MUNDIAL_END:   "2026-07-19"

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Date guard (skip outside Mundial window)
        id: gate
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          if [[ "$TODAY" < "$MUNDIAL_START" ]] || [[ "$TODAY" > "$MUNDIAL_END" ]]; then
            echo "→ $TODAY fuera de la ventana del Mundial ($MUNDIAL_START..$MUNDIAL_END). Skip."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "→ $TODAY dentro de la ventana del Mundial. Continuamos."
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Install PostgreSQL client
        if: steps.gate.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        if: steps.gate.outputs.skip != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL secret missing"
            exit 1
          fi
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          FILE="wmundial-tournament-${TIMESTAMP}.sql.gz"
          pg_dump "$DATABASE_URL" --no-owner --no-acl | gzip > "$FILE"
          echo "Dump size: $(du -h "$FILE" | cut -f1)"
          echo "BACKUP_FILE=$FILE" >> $GITHUB_ENV

      - name: Verify dump integrity
        if: steps.gate.outputs.skip != 'true'
        run: |
          BYTES=$(stat -c%s "$BACKUP_FILE")
          if [ "$BYTES" -lt 1024 ]; then
            echo "❌ Backup file suspiciously small: ${BYTES}B"
            exit 1
          fi
          gzip -t "$BACKUP_FILE" && echo "✓ Gzip integrity OK"
          if ! zcat "$BACKUP_FILE" | head -50 | grep -qE "^(SET|CREATE)"; then
            echo "❌ Backup does not look like a valid pg_dump"
            exit 1
          fi
          echo "✓ Backup verified"

      - name: Upload backup as artifact
        if: steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wmundial-tournament-backup
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
          if-no-files-found: error
