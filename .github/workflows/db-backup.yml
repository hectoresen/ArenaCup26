name: DB backup

# Backup diario de Postgres a un bucket S3-compatible (Backblaze B2 o
# Cloudflare R2). Retención SMART aplicada en el propio workflow (ver
# step "Smart retention" más abajo): borra backups de >10 días siempre
# y cuando existan ≥2 más recientes — así nunca quedamos sin cobertura.
#
# **Setup en GitHub Secrets**:
#   - `DATABASE_URL` → la URL completa de Railway Postgres (incluye
#     password). Necesaria para `pg_dump`.
#   - `BACKUP_S3_ENDPOINT` → endpoint compatible S3 (B2: `https://s3.eu-central-003.backblazeb2.com`).
#   - `BACKUP_S3_BUCKET` → nombre del bucket (e.g. `wmundial-backups`).
#   - `BACKUP_S3_ACCESS_KEY` y `BACKUP_S3_SECRET_KEY`.
#   - `BACKUP_S3_REGION` (opcional, default `auto` para R2 /
#     `eu-central-003` para B2).
#
# **Setup en el bucket (una vez)**:
#  1. Crear bucket privado.
#  2. Generar Application Key con scope solo-este-bucket.
#     (NO se requiere lifecycle policy — la retención la maneja
#     este workflow.)

on:
  schedule:
    # 03:00 UTC todos los días — momento valle de tráfico.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          # postgresql-client-16 alineado con la mayor de Railway managed
          # Postgres en 2026. Si Railway sube a 17, actualizar aquí.
          sudo apt-get install -y postgresql-client

      - name: Install AWS CLI (S3-compatible client)
        run: |
          curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscli.zip
          unzip -q /tmp/awscli.zip -d /tmp
          sudo /tmp/aws/install --update

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL secret missing"
            exit 1
          fi
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          FILE="wmundial-${TIMESTAMP}.sql.gz"
          # `--no-owner --no-acl` para que el dump sea restaurable en
          # cualquier servidor con permisos distintos. `-Fc` daría
          # custom format (más rápido restore + parallel) pero el
          # plain + gzip es más portable y fácil de inspeccionar.
          pg_dump "$DATABASE_URL" --no-owner --no-acl | gzip > "$FILE"
          echo "Dump size: $(du -h "$FILE" | cut -f1)"
          echo "BACKUP_FILE=$FILE" >> $GITHUB_ENV

      - name: Upload to S3-compatible bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.BACKUP_S3_REGION || 'auto' }}
          ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
          BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
        run: |
          if [ -z "$ENDPOINT" ] || [ -z "$BUCKET" ]; then
            echo "❌ BACKUP_S3_ENDPOINT or BACKUP_S3_BUCKET secret missing"
            exit 1
          fi
          aws s3 cp "$BACKUP_FILE" "s3://$BUCKET/daily/$BACKUP_FILE" \
            --endpoint-url "$ENDPOINT" \
            --no-progress
          echo "✓ Uploaded $BACKUP_FILE to s3://$BUCKET/daily/"

      - name: Verify restore (dry run pg_restore --list)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # Sanidad mínima: el archivo debe descomprimir y empezar
          # con un DDL válido. Si pg_dump falló silenciosamente
          # tendríamos un .sql.gz vacío o corrupto.
          BYTES=$(stat -c%s "$BACKUP_FILE")
          if [ "$BYTES" -lt 1024 ]; then
            echo "❌ Backup file suspiciously small: ${BYTES}B"
            exit 1
          fi
          # gzip -t verifica integridad sin descomprimir entero.
          gzip -t "$BACKUP_FILE" && echo "✓ Gzip integrity OK"
          # Primeras líneas deben contener al menos un CREATE/SET.
          if ! zcat "$BACKUP_FILE" | head -50 | grep -qE "^(SET|CREATE)"; then
            echo "❌ Backup does not look like a valid pg_dump"
            exit 1
          fi
          echo "✓ Backup verified"

      - name: Smart retention (delete >10d only if ≥2 newer exist)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.BACKUP_S3_REGION || 'auto' }}
          ENDPOINT: ${{ secrets.BACKUP_S3_ENDPOINT }}
          BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
        run: |
          # Reglas: para borrar un backup, deben existir ≥2 más recientes.
          # Implementación equivalente: ordenar todos por fecha desc,
          # saltarse los 2 primeros (que SIEMPRE se conservan), y de los
          # restantes borrar los que tengan >10 días.
          #
          # Esto garantiza: como mínimo siempre 2 backups (los más
          # recientes) y cualquier backup <= 10d. No depende del
          # lifecycle del bucket, así que funciona contra cualquier
          # S3-compatible (B2, R2, MinIO, etc.).
          aws s3api list-objects-v2 \
            --endpoint-url "$ENDPOINT" \
            --bucket "$BUCKET" \
            --prefix "daily/" \
            --query "sort_by(Contents, &LastModified)[*].[Key,LastModified]" \
            --output text > /tmp/backups.txt || true

          if [ ! -s /tmp/backups.txt ]; then
            echo "→ No hay backups en daily/, nada que retener."
            exit 0
          fi

          # `sort_by` con `&LastModified` lo deja ascendente (oldest first).
          # Reverse para tener newest first.
          tac /tmp/backups.txt > /tmp/backups-desc.txt

          TOTAL=$(wc -l < /tmp/backups-desc.txt)
          echo "→ $TOTAL backups en daily/"
          if [ "$TOTAL" -le 2 ]; then
            echo "→ ≤2 backups, conservamos todos por la regla \"≥2 posteriores\"."
            exit 0
          fi

          # Skip los 2 más recientes; de los restantes, borrar >10d.
          NOW_TS=$(date -u +%s)
          THRESHOLD_TS=$((NOW_TS - 10*24*3600))
          DELETED=0
          KEPT=0
          tail -n +3 /tmp/backups-desc.txt | while IFS=$'\t' read -r KEY LASTMOD; do
            # LASTMOD viene como ISO 8601 UTC, e.g. "2026-05-09T03:00:42+00:00".
            MOD_TS=$(date -u -d "$LASTMOD" +%s 2>/dev/null || echo 0)
            if [ "$MOD_TS" -lt "$THRESHOLD_TS" ]; then
              aws s3 rm "s3://$BUCKET/$KEY" --endpoint-url "$ENDPOINT" --quiet
              echo "  deleted (>10d): $KEY"
              DELETED=$((DELETED + 1))
            else
              KEPT=$((KEPT + 1))
            fi
          done
          echo "→ Retención completa. Conservados (top 2 + recientes): kept=$KEPT del bucket, eliminados=$DELETED"
