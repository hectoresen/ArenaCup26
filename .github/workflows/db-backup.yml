name: DB backup

# Backup diario de Postgres como GitHub Actions Artifact. Retención
# 90 días (default de GH Free). No requiere infraestructura externa
# (Backblaze, R2, S3); todo vive dentro de GitHub.
#
# **Setup en GitHub Secrets** (uno solo):
#   - `DATABASE_URL` → URL pública de Railway Postgres (incluye
#     password). Es el `DATABASE_PUBLIC_URL` del service Postgres,
#     NO el `DATABASE_URL` interno (que apunta a *.railway.internal
#     y solo resuelve dentro de Railway).
#
# **Descarga del backup más reciente** (para restore):
#   ```bash
#   # Listar runs recientes
#   gh run list --workflow=db-backup.yml --limit 5
#
#   # Descargar el artifact del último run
#   gh run download <run-id> --name wmundial-backup --dir ./restore
#
#   # Restaurar (asume Postgres local o staging — NUNCA prod sin
#   # haber hecho un dump del estado actual antes):
#   zcat ./restore/wmundial-*.sql.gz | psql "$DATABASE_URL"
#   ```
#
# Tamaño esperado: ~50-300 KB por dump (BD ~1 MB sin comprimir,
# gzip lo deja en <30%). Plan GH Free permite 500 MB de artifacts —
# caben miles de dumps. Con 90 días de retención y 1 dump/día = 90
# dumps = ~30 MB. Trivial.

on:
  schedule:
    # 03:00 UTC todos los días — momento valle de tráfico.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install PostgreSQL 18 client
        run: |
          # Railway managed Postgres está en v18 desde mid-2026. apt
          # default trae v16, que falla con "server version mismatch"
          # al dumpear una BD v18. Añadimos el repo oficial PGDG para
          # tener client v18.
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg
          curl -sSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL secret missing"
            exit 1
          fi
          # `pg_dump 18` para emparejar la mayor de Railway managed Postgres.
          PG_DUMP=$(ls /usr/lib/postgresql/18/bin/pg_dump 2>/dev/null || command -v pg_dump)
          echo "Using $PG_DUMP ($($PG_DUMP --version))"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          FILE="wmundial-${TIMESTAMP}.sql.gz"
          # `--no-owner --no-acl` para que el dump sea restaurable en
          # cualquier servidor con permisos distintos. Plain + gzip
          # es portable y fácil de inspeccionar (zcat | head).
          # `pipefail` arriba garantiza que si pg_dump falla, gzip no
          # enmascara el exit code.
          "$PG_DUMP" "$DATABASE_URL" --no-owner --no-acl | gzip > "$FILE"
          echo "Dump size: $(du -h "$FILE" | cut -f1)"
          echo "BACKUP_FILE=$FILE" >> $GITHUB_ENV

      - name: Verify dump integrity
        run: |
          BYTES=$(stat -c%s "$BACKUP_FILE")
          if [ "$BYTES" -lt 1024 ]; then
            echo "❌ Backup file suspiciously small: ${BYTES}B"
            exit 1
          fi
          # gzip -t verifica integridad sin descomprimir entero.
          gzip -t "$BACKUP_FILE" && echo "✓ Gzip integrity OK"
          # Primeras líneas deben contener al menos un CREATE/SET.
          if ! zcat "$BACKUP_FILE" | head -50 | grep -qE "^(SET|CREATE)"; then
            echo "❌ Backup does not look like a valid pg_dump"
            exit 1
          fi
          echo "✓ Backup verified"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wmundial-backup
          path: ${{ env.BACKUP_FILE }}
          # 90 días = máximo del plan Free. Si en el futuro pasamos a
          # plan pagado podemos subir esto a 400. Para nuestra cadencia
          # diaria, 90d cubre cualquier situación realista.
          retention-days: 90
          # `error` (default) si el patrón no encuentra archivo. Útil
          # como sanity check de que el step anterior generó el dump.
          if-no-files-found: error
