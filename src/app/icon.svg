<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0d1117"/>

  <!-- Trophy cup body -->
  <path d="M9 7 C7.5 7 6 8.5 6 11 C6 14.5 8 17 11.5 18.5 L13.5 19.5 L18.5 19.5 L20.5 18.5 C24 17 26 14.5 26 11 C26 8.5 24.5 7 23 7 Z"
        fill="url(#tG)" stroke="url(#tS)" stroke-width="0.6"/>

  <!-- Cup shine -->
  <ellipse cx="13" cy="11" rx="2" ry="3.5" fill="rgba(255,255,255,0.18)" transform="rotate(-10 13 11)"/>

  <!-- Left handle -->
  <path d="M9 10 C5.5 9.5 4.5 13 6 15 C6.5 16 8 16.5 9 16"
        fill="none" stroke="url(#hG)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Right handle -->
  <path d="M23 10 C26.5 9.5 27.5 13 26 15 C25.5 16 24 16.5 23 16"
        fill="none" stroke="url(#hG)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Stem -->
  <rect x="14.2" y="19.5" width="3.6" height="5.5" rx="1" fill="url(#sG)"/>

  <!-- Base -->
  <rect x="11" y="25" width="10" height="2.2" rx="1.1" fill="url(#bG)"/>

  <!-- Football on top -->
  <circle cx="16" cy="5.5" r="3.2" fill="#f0f0f0" stroke="#1a1a2e" stroke-width="0.5"/>
  <path d="M16 2.8 L17.2 3.8 L16.8 5.2 L15.2 5.2 L14.8 3.8 Z" fill="#111" opacity="0.85"/>
  <path d="M13.2 4.2 L14.8 3.8 L15.2 5.2 L14 6.2 L12.8 5.5 Z" fill="#111" opacity="0.65"/>
  <path d="M18.8 4.2 L17.2 3.8 L16.8 5.2 L18 6.2 L19.2 5.5 Z" fill="#111" opacity="0.65"/>

  <defs>
    <linearGradient id="tG" x1="16" y1="7" x2="16" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffe066"/>
      <stop offset="45%"  stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#a06800"/>
    </linearGradient>
    <linearGradient id="tS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe88a"/>
      <stop offset="100%" stop-color="#7a4800"/>
    </linearGradient>
    <linearGradient id="hG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#c88800"/>
    </linearGradient>
    <linearGradient id="sG" x1="14" y1="19" x2="18" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4920a"/>
      <stop offset="100%" stop-color="#a06800"/>
    </linearGradient>
    <linearGradient id="bG" x1="11" y1="25" x2="21" y2="27" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c88800"/>
      <stop offset="50%" stop-color="#f0b830"/>
      <stop offset="100%" stop-color="#a06800"/>
    </linearGradient>
  </defs>
</svg>
